name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Ruff
        run: |
          ruff check .
  import-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Import + CLI help
        run: |
          python -c "import nuthem, pipeline; print('ok')"
          nuthem --help
          nuthem-pipeline --help
